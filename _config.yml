title: 粉丝之家博客
description: 记录多平台社媒运营、内容增长、下单体验与站点建设的中文博客。
theme: minima
lang: zh-CN
locale: zh_CN
url: https://nam6.github.io
baseurl: ""
author: nam6
timezone: Asia/Shanghai
show_excerpts: true
permalink: /:year/:month/:day/:title/
logo: /assets/site-cover.svg

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

feed:
  path: feed.xml

paginate: 6
paginate_path: "/page/:num/"

defaults:
  - scope:
      path: ""
    values:
      image: /assets/site-cover.svg
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: nam6

navigation:
  - title: 首页
    url: /
  - title: 专题
    url: /categories/
  - title: 标签
    url: /tags/
  - title: 归档
    url: /archive/
  - title: 关于
    url: /about/
  - title: 主站
    url: https://nam6.com
